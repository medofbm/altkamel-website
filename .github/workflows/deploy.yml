name: Deploy Nuxt Site to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: ⚙️ Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 📦 Install Dependencies
      run: npm install

    - name: 🚀 Build Nuxt Project
      env:
        NUXT_PUBLIC_SAS_AES_KEY: ${{ secrets.NUXT_PUBLIC_SAS_AES_KEY }}
      run: npm run generate

    - name: 📂 Deploy to cPanel via LFTP
      run: |
        sudo apt-get install -y lftp
        lftp -c "
        set ftp:ssl-allow no;
        set ssl:verify-certificate no;
        set net:timeout 60;
        set net:max-retries 5;
        set net:reconnect-interval-base 5;
        open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp://${{ secrets.FTP_SERVER }};

        # ══════════════════════════════════════════════════════════════════
        # المرحلة 1 — مجلد _nuxt (بالحذف)
        # يمسح الـ chunks القديمة ويرفع الجديدة لمنع تراكم الملفات
        # ══════════════════════════════════════════════════════════════════
        mirror --reverse --delete --parallel=5 --ignore-time --no-perms \
          .output/public/_nuxt/ /_nuxt/;

        # ══════════════════════════════════════════════════════════════════
        # المرحلة 2 — ملفات HTML الجذر (دائماً بالكتابة الفورية)
        # يجب رفعها بـ put دائماً لأن LFTP قد يتجاهلها إذا تشابه حجمها
        # هذه الملفات تحتوي مراجع لأسماء _nuxt المتغيرة مع كل بناء
        # ══════════════════════════════════════════════════════════════════
        put -O / .output/public/index.html;
        put -O / .output/public/200.html;
        put -O / .output/public/404.html;

        # ══════════════════════════════════════════════════════════════════
        # المرحلة 3 — المجلدات الفرعية (بدون حذف، آمن 100%)
        # portal/ و about/ يحتويان صفحات Nuxt المولّدة
        # images/ و sas-api/ محمية تلقائياً (غير موجودة في البناء)
        # ══════════════════════════════════════════════════════════════════
        mirror --reverse --parallel=3 --ignore-time --no-perms \
          --exclude '^_nuxt/' \
          .output/public/ /;

        quit;
        "
